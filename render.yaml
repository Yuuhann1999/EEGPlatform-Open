services:
  - type: web
    name: eegplatform-api
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: MAX_UPLOAD_SIZE_MB
        value: "100"
      - key: TFR_N_JOBS
        value: "1"
      - key: ENABLE_ICLABEL
        value: "true"
      - key: ICA_FIT_MAX_SFREQ
        value: "80"
      - key: ICA_FIT_MAX_DURATION_SECONDS
        value: "20"
      - key: ICA_MAX_COMPONENTS
        value: "8"
      - key: MAX_UNDO_STACK
        value: "0"
      - key: LOG_REQUESTS
        value: "true"
